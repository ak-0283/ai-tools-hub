<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact AI Tools Hub | Feedback & Support</title>
  <meta name="description" content="Contact AI Tools Hub for feedback, support, and suggestions related to confusion matrix and ML metrics tools." />
  <meta name="keywords" content="contact AI tools hub, confusion matrix support, machine learning tools feedback" />
  <meta name="author" content="Abhay Kumar" />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#4f46e5" />
  <link rel="canonical" href="https://ai-tools-hub.vercel.app/contact.html" />

  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="AI Tools Hub" />
  <meta property="og:title" content="Contact AI Tools Hub | Feedback & Support" />
  <meta property="og:description" content="Send feedback and support requests for AI Tools Hub evaluation tools." />
  <meta property="og:url" content="https://ai-tools-hub.vercel.app/contact.html" />
  <meta property="og:locale" content="en_US" />

  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Contact AI Tools Hub | Feedback & Support" />
  <meta name="twitter:description" content="Reach out for support and feature suggestions for AI Tools Hub." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "ContactPage",
    "url": "https://ai-tools-hub.vercel.app/contact.html",
    "name": "Contact AI Tools Hub",
    "description": "Contact page for AI Tools Hub feedback and support.",
    "isPartOf": {
      "@type": "WebSite",
      "url": "https://ai-tools-hub.vercel.app/",
      "name": "AI Tools Hub"
    },
    "inLanguage": "en"
  }
  </script>
</head>
<body>
  <!-- Loading Overlay -->
  <div class="loader-wrapper" id="loader" aria-label="Loading">
    <div class="spinner" aria-hidden="true"></div>
  </div>

  <!-- Sticky Navbar -->
  <header class="site-header">
    <nav class="navbar container">
      <a href="index.html" class="logo">AI Tools Hub</a>

      <button class="menu-toggle" id="menuToggle" aria-label="Toggle navigation" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode" title="Toggle dark mode">
        <span class="theme-icon" aria-hidden="true">🌙</span>
      </button>

      <ul class="nav-links" id="navLinks">
        <li><a href="index.html" data-page="index">Home</a></li>
        <li><a href="about.html" data-page="about">About</a></li>
        <li><a href="contact.html" data-page="contact">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="page-hero section container reveal">
      <h1>Contact Us</h1>
      <p>We'd love to hear your feedback and ideas.</p>
    </section>

    <section class="section container reveal">
      <!-- Contact Form -->
      <form id="contactForm" class="contact-form" novalidate>
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Enter your full name" />
          <small class="error-text" id="nameError"></small>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="Enter your email address" />
          <small class="error-text" id="emailError"></small>
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" placeholder="Write your message..."></textarea>
          <small class="error-text" id="messageError"></small>
        </div>

        <button type="submit" class="btn btn-primary">Send Message</button>
        <p id="formSuccess" class="success-text" role="status" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <!-- Scroll to Top -->
  <button id="scrollTopBtn" class="scroll-top" aria-label="Scroll to top">↑</button>

  <!-- Footer -->
  <footer class="site-footer">
    <p>© 2026 AI Tools Hub | Built by Abhay Kumar</p>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
